<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saad Khaleeq</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4f46e5;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            color: #1e1b4b;
            margin: 0 0 6px;
        }

        .reg {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
            letter-spacing: 0.4px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4f46e5;
            margin-bottom: 12px;
        }

        .members {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .members li {
            background: #f0f4ff;
            border-left: 4px solid #4f46e5;
            border-radius: 6px;
            padding: 10px 16px;
            margin-bottom: 10px;
            text-align: left;
        }

        .members li .member-name {
            font-weight: 600;
            color: #1e1b4b;
            font-size: 15px;
        }

        .members li .member-reg {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="photo.jpg" alt="Saad Khaleeq" class="photo">

    <h1>Saad Khaleeq</h1>
    <div class="reg">5049-FOC/BSCS/F23</div>

    <div class="section-title">Group Members</div>
    <ul class="members">
        <li>
            <div class="member-name">Saad Khaleeq</div>
            <div class="member-reg">5049-FOC/BSCS/F23</div>
        </li>
        <li>
            <div class="member-name">Muhammad Ihsan</div>
            <div class="member-reg">5013-FOC/BSCS/F23</div>
        </li>
    </ul>
</div>

</body>
</html>
